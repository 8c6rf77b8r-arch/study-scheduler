<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="学習スケジューラー">
<meta name="theme-color" content="#2d4a3e">
<link rel="manifest" href="./manifest.json">

<title>資格試験 学習スケジューラー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;

    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    background: #2d4a3e; color: #f0ede8;
    padding: 14px 20px; display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.04em; }
  .tabs {
    background: #2d4a3e; display: flex; padding: 0 8px;
    position: sticky; top: 52px; z-index: 99; overflow-x: auto;
  }
  .tab-btn {
    background: none; border: none; cursor: pointer;
    color: #a8c4b8; padding: 10px 14px;
    font-size: 0.82rem; border-bottom: 3px solid transparent;
    white-space: nowrap; transition: all 0.2s;
  }
  .tab-btn.active { color: #fff; border-bottom-color: #7bc4a0; }
  .container { max-width: 900px; margin: 0 auto; padding: 14px 12px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .card {
    background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .card h2 {
    font-size: 0.93rem; font-weight: 700; color: #2d4a3e;
    margin-bottom: 14px; padding-bottom: 7px; border-bottom: 2px solid #e8f0ec;
  }
  .form-row { display: flex; align-items: center; gap: 10px; margin-bottom: 11px; flex-wrap: wrap; }
  label { font-size: 0.84rem; color: #555; white-space: nowrap; min-width: 108px; }
  input[type="text"], input[type="date"], input[type="number"] {
    border: 1px solid #d0ccc6; border-radius: 6px; padding: 8px 11px;
    font-size: 0.88rem; font-family: inherit; background: #fafaf8; -webkit-appearance: none;
  }
  input:focus { outline: none; border-color: #7bc4a0; background: #fff; }
  input[type="number"] { width: 86px; }
  input[type="text"] { flex: 1; min-width: 150px; }
  input[type="date"] { width: 152px; }
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 0.855rem; font-family: inherit; font-weight: 600; transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: #2d4a3e; color: #fff; }
  .btn-primary:active { background: #3a6050; }
  .btn-secondary { background: #e8f0ec; color: #2d4a3e; }
  .btn-secondary:active { background: #d0e4d8; }
  .btn-danger { background: #fde8e8; color: #c0392b; }
  .btn-warn { background: #fff3cd; color: #7a5a00; }
  .btn-sm { padding: 5px 9px; font-size: 0.78rem; border-radius: 6px; }
  .subject-block { border: 1px solid #e0dbd5; border-radius: 8px; padding: 13px; margin-bottom: 11px; }
  .subject-header { display: flex; align-items: center; gap: 8px; margin-bottom: 11px; }
  .material-list { margin-left: 8px; }
  .material-block {
    border-left: 3px solid #e8f0ec; padding: 9px 11px; margin-bottom: 9px;
    background: #fafaf8; border-radius: 0 6px 6px 0;
  }
  .material-header { display: flex; align-items: center; gap: 7px; margin-bottom: 9px; }
  .unit-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
  .unit-table th {
    background: #f0ede8; font-size: 0.76rem; padding: 5px 7px;
    text-align: left; color: #666; border-bottom: 1px solid #ddd;
  }
  .unit-table td { padding: 4px 5px; border-bottom: 1px solid #f0ede8; }
  .unit-table input[type="text"] { width: 100%; min-width: 0; }
  .unit-table input[type="number"] { width: 72px; }
  .banner {
    padding: 11px 13px; border-radius: 8px; font-size: 0.84rem;
    margin-bottom: 13px; line-height: 1.55;
  }
  .banner-warn { background: #fff3cd; color: #7a5a00; border-left: 4px solid #f0a500; }
  .banner-ok   { background: #e8f5ee; color: #1a6637; border-left: 4px solid #7bc4a0; }
  .banner-info { background: #e8eef5; color: #1a3660; border-left: 4px solid #5a86c4; }
  .schedule-day {
    border: 1px solid #e0dbd5; border-radius: 8px; padding: 11px 13px;
    margin-bottom: 8px; background: #fff;
  }
  .schedule-day.today { border-color: #7bc4a0; background: #f2faf6; }
  .schedule-day-header { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
  .day-date { font-weight: 700; font-size: 0.9rem; }
  .day-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 20px; font-weight: 600; }
  .badge-today  { background: #7bc4a0; color: #fff; }
  .badge-reserve { background: #e8eef5; color: #5a86c4; }
  .day-time { font-size: 0.76rem; color: #888; margin-left: auto; }
  .unit-item {
    font-size: 0.8rem; padding: 3px 0 3px 9px;
    border-left: 2px solid #e0dbd5; margin-bottom: 3px; color: #444; line-height: 1.4;
  }
  .subject-tag {
    font-size: 0.7rem; background: #e8f0ec; color: #2d4a3e;
    border-radius: 3px; padding: 1px 5px; margin-right: 4px; font-weight: 600; white-space: nowrap;
  }
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; margin-bottom: 13px; }
  .stat-box { background: #fff; border-radius: 8px; padding: 13px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .stat-num { font-size: 1.45rem; font-weight: 700; color: #2d4a3e; }
  .stat-label { font-size: 0.73rem; color: #888; margin-top: 3px; }
  .pwa-hint {
    background: #2d4a3e; color: #e8f5ee; border-radius: 10px;
    padding: 13px 15px; margin-bottom: 13px; font-size: 0.8rem; line-height: 1.7; display: none;

  .pwa-hint strong { color: #7bc4a0; }
  .preset-banner {
    background: linear-gradient(135deg, #2d4a3e, #3a6050);
    color: #e8f5ee; border-radius: 10px; padding: 14px 16px; margin-bottom: 13px;
  }
  .preset-banner h3 { font-size: 0.9rem; margin-bottom: 6px; color: #7bc4a0; }
  .preset-banner p { font-size: 0.8rem; line-height: 1.6; opacity: 0.9; }
  .preset-stats { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .preset-stat { font-size: 0.78rem; }
  .preset-stat strong { font-size: 1.1rem; color: #7bc4a0; display: block; }
  .mt8 { margin-top: 8px; }
  .mt12 { margin-top: 12px; }
  .text-sm { font-size: 0.76rem; color: #888; }
  .flex-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7bc4a0" stroke-width="2">
    <rect x="3" y="4" width="18" height="18" rx="2"/>
    <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>

  <h1>学習スケジューラー</h1>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('settings',this)">⚙️ 設定</button>
  <button class="tab-btn" onclick="switchTab('subjects',this)">📚 科目・教材</button>
  <button class="tab-btn" onclick="switchTab('schedule',this)">📅 スケジュール</button>
</div>

<!-- 設定 -->
<div id="tab-settings" class="tab-content active">
<div class="container">
  <div class="pwa-hint" id="pwa-hint">
    📲 <strong>ホーム画面に追加する方法</strong><br>
    Safariの下部「共有」ボタン（□↑）→「ホーム画面に追加」→「追加」
  </div>
  <div class="card">
    <h2>試験・学習の基本設定</h2>
    <div class="form-row">
      <label>試験日</label>
      <input type="date" id="examDate">
    </div>
    <div class="form-row">
      <label>1日の勉強時間</label>
      <input type="number" id="dailyMinutes" min="10" max="720" value="120">
      <span class="text-sm">分 / 日</span>
    </div>
    <div class="form-row">
      <label>全体の周回数</label>
      <input type="number" id="laps" min="1" max="5" value="2">
      <span class="text-sm">周</span>
    </div>
    <div class="form-row">
      <label>予備日（週に）</label>
      <input type="number" id="reserveDays" min="0" max="3" value="1">
      <span class="text-sm">日（遅れ調整用）</span>
    </div>
    <div class="mt12">
      <button class="btn btn-primary" onclick="saveSettings()">💾 保存する</button>
    </div>
    <div id="settings-msg" class="mt8"></div>
  </div>
  <div class="card">
    <h2>💡 データについて</h2>
    <p class="text-sm" style="line-height:1.7;color:#555;">
      入力したデータはこのブラウザ（Safari）内に自動保存されます。<br>
      アプリを閉じても次に開いたとき同じデータが残っています。<br><br>
      ⚠️ ブラウザの「履歴・データを消去」をすると消えます。
    </p>
    <div class="mt8">
      <button class="btn btn-warn btn-sm" onclick="resetToPreset()">🔄 プリセットデータに戻す</button>
    </div>
  </div>
</div>
</div>

<!-- 科目・教材 -->
<div id="tab-subjects" class="tab-content">
<div class="container">
  <div class="preset-banner">
    <h3>📖 登録済み教材データ</h3>
    <p>テキスト3冊・問題集3冊のデータが最初から入っています。<br>単元名や時間は自由に編集できます。</p>
    <div class="preset-stats">
      <div class="preset-stat"><strong id="stat-units">―</strong>単元数（1周）</div>
      <div class="preset-stat"><strong id="stat-time">―</strong>総時間（1周）</div>
    </div>
  </div>
  <div id="subjects-container"></div>
  <div class="flex-row mt8">
    <button class="btn btn-secondary" onclick="addSubject()">＋ 科目を追加</button>
    <button class="btn btn-primary" onclick="saveSubjects()">💾 保存する</button>
  </div>
  <div id="subjects-msg" class="mt8"></div>
</div>
</div>

<!-- スケジュール -->
<div id="tab-schedule" class="tab-content">
<div class="container">
  <div id="schedule-summary"></div>
  <div id="schedule-list"></div>
</div>
</div>

            { id: uid(), name: '総合③-問1〜3（連続個別・残高試算表）', minutes: 150 },
            { id: uid(), name: '総合③-問4〜5（連続個別・残高試算表）', minutes: 140 },
            { id: uid(), name: '総合③-問6〜7（連続個別）', minutes: 110 },
          ]},
        ]
      }
    ]
  };
}

// ==================== データ管理 ====================
const LS_KEY = 'study_scheduler_v2';
function uid() { return Math.random().toString(36).slice(2,10); }

function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem(LS_KEY));
    return d || makePreset();
  } catch(e) { return makePreset(); }
}
function saveData(data) { localStorage.setItem(LS_KEY, JSON.stringify(data)); }

let appData = loadData();

// ==================== Service Worker ====================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ==================== PWAヒント ====================
if (/iP(hone|ad|od)/.test(navigator.userAgent) && /WebKit/.test(navigator.userAgent)
    && !/(CriOS|FxiOS)/.test(navigator.userAgent)
    && !window.matchMedia('(display-mode: standalone)').matches && !navigator.standalone) {
  document.getElementById('pwa-hint').style.display = 'block';
}

// ==================== タブ ====================
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'schedule') renderSchedule();
  if (name === 'subjects') { renderSubjects(); updatePresetStats(); }
  if (name === 'settings') loadSettings();
}

// ==================== 設定 ====================
function loadSettings() {
  const s = appData.settings;
  document.getElementById('examDate').value = s.examDate || '';
  document.getElementById('dailyMinutes').value = s.dailyMinutes || 120;
  document.getElementById('laps').value = s.laps || 2;
  document.getElementById('reserveDays').value = s.reserveDays ?? 1;
}
function saveSettings() {
  appData.settings = {
    examDate: document.getElementById('examDate').value,
    dailyMinutes: parseInt(document.getElementById('dailyMinutes').value) || 120,
    laps: parseInt(document.getElementById('laps').value) || 2,
    reserveDays: parseInt(document.getElementById('reserveDays').value) ?? 1
  };
  saveData(appData);
  showMsg('settings-msg', '✅ 保存しました', 'ok');
}
function resetToPreset() {
  if (!confirm('教材データをプリセット（初期データ）に戻しますか？\n設定（試験日・学習時間）は残ります。')) return;
  const preset = makePreset();
  appData.subjects = preset.subjects;
  saveData(appData);
  renderSubjects();
  updatePresetStats();
  alert('プリセットデータに戻しました。');
}

// ==================== 科目・教材 ====================
function updatePresetStats() {
  let totalUnits = 0, totalMin = 0;
  appData.subjects.forEach(s => s.materials.forEach(m => {
    totalUnits += m.units.length;
    totalMin += m.units.reduce((a,u) => a + (u.minutes||0), 0);
  }));
  document.getElementById('stat-units').textContent = totalUnits;
  const h = Math.floor(totalMin/60), m = totalMin%60;
  document.getElementById('stat-time').textContent = h + 'h' + (m>0?m+'m':'');
}

function renderSubjects() {
  const container = document.getElementById('subjects-container');
  container.innerHTML = '';
  appData.subjects.forEach((subj, si) => {
    const div = document.createElement('div');
    div.className = 'card subject-block';
    div.innerHTML = `
      <div class="subject-header">
        <strong style="color:#888;font-size:0.76rem;">科目 ${si+1}</strong>
        <input type="text" style="flex:1;min-width:0" value="${esc(subj.name)}"
          onchange="appData.subjects[${si}].name=this.value">
        <button class="btn btn-danger btn-sm" onclick="removeSubject(${si})">✕</button>
      </div>
      <div class="material-list" id="mlist-${si}"></div>
      <button class="btn btn-secondary btn-sm mt8" onclick="addMaterial(${si})">＋ 教材を追加</button>
    `;
    container.appendChild(div);
    renderMaterials(si);
  });
}

function renderMaterials(si) {
  const container = document.getElementById('mlist-' + si);
  if (!container) return;
  container.innerHTML = '';
  appData.subjects[si].materials.forEach((mat, mi) => {
    const unitCount = mat.units.length;
    const unitMin = mat.units.reduce((a,u)=>a+(u.minutes||0),0);
    const div = document.createElement('div');
    div.className = 'material-block';
    div.innerHTML = `
      <div class="material-header">
        <span style="color:#888;font-size:0.76rem;">教材</span>
        <input type="text" style="flex:1;min-width:0" value="${esc(mat.name)}"
          onchange="appData.subjects[${si}].materials[${mi}].name=this.value">
        <span class="text-sm" style="white-space:nowrap">${unitCount}単元 / ${Math.floor(unitMin/60)}h${unitMin%60}m</span>
        <button class="btn btn-danger btn-sm" onclick="removeMaterial(${si},${mi})">✕</button>
      </div>
      <table class="unit-table">
        <thead><tr><th>単元名</th><th>時間（分）</th><th></th></tr></thead>
        <tbody id="units-${si}-${mi}"></tbody>
      </table>
      <button class="btn btn-secondary btn-sm mt8" onclick="addUnit(${si},${mi})">＋ 単元を追加</button>
    `;
    container.appendChild(div);
    renderUnits(si, mi);
  });
}

function renderUnits(si, mi) {
  const tbody = document.getElementById(`units-${si}-${mi}`);
  if (!tbody) return;
  tbody.innerHTML = '';
  appData.subjects[si].materials[mi].units.forEach((u, ui) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${esc(u.name)}"
        onchange="appData.subjects[${si}].materials[${mi}].units[${ui}].name=this.value"></td>
      <td><input type="number" value="${u.minutes}" min="1"
        onchange="appData.subjects[${si}].materials[${mi}].units[${ui}].minutes=parseInt(this.value)||0"></td>
      <td><button class="btn btn-danger btn-sm" onclick="removeUnit(${si},${mi},${ui})">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function addSubject() {
  appData.subjects.push({ id: uid(), name: `新しい科目`, materials: [
    { id: uid(), name: '教材1', units: [{ id: uid(), name: '第1章', minutes: 60 }] }
  ]});
  renderSubjects(); updatePresetStats();
}
function removeSubject(si) {
  if (!confirm('この科目を削除しますか？')) return;
  appData.subjects.splice(si, 1); renderSubjects(); updatePresetStats();
}
function addMaterial(si) {
  appData.subjects[si].materials.push({ id: uid(), name: '新しい教材', units: [{ id: uid(), name: '第1章', minutes: 30 }] });
  renderMaterials(si); updatePresetStats();
}
function removeMaterial(si, mi) {
  if (!confirm('この教材を削除しますか？')) return;
  appData.subjects[si].materials.splice(mi, 1); renderMaterials(si); updatePresetStats();
}
function addUnit(si, mi) {
  const units = appData.subjects[si].materials[mi].units;
  units.push({ id: uid(), name: `第${units.length+1}章`, minutes: 30 });
  renderUnits(si, mi); updatePresetStats();
}
function removeUnit(si, mi, ui) {
  appData.subjects[si].materials[mi].units.splice(ui, 1);
  renderUnits(si, mi); updatePresetStats();
}
function saveSubjects() { saveData(appData); showMsg('subjects-msg', '✅ 保存しました', 'ok'); }

// ==================== スケジュール ====================
function renderSchedule() {
  const summaryEl = document.getElementById('schedule-summary');
  const listEl = document.getElementById('schedule-list');
  summaryEl.innerHTML = ''; listEl.innerHTML = '';

  const s = appData.settings;
  if (!s.examDate) {
    summaryEl.innerHTML = `<div class="banner banner-warn">⚠️「設定」タブで試験日を入力してください。</div>`;
    return;
  }
  const today = new Date(); today.setHours(0,0,0,0);
  const examDate = new Date(s.examDate); examDate.setHours(0,0,0,0);
  if (examDate <= today) {
    summaryEl.innerHTML = `<div class="banner banner-warn">⚠️ 試験日が今日以前です。設定を確認してください。</div>`;
    return;
  }

  const laps = s.laps || 2;
  const dailyMin = s.dailyMinutes || 120;
  const reservePerWeek = s.reserveDays ?? 1;

  const baseUnits = [];
  appData.subjects.forEach(subj => {
    subj.materials.forEach(mat => {
      mat.units.forEach(u => {
        baseUnits.push({ subjName: subj.name, matName: mat.name, unitName: u.name, minutes: u.minutes || 0 });
      });
    });
  });

  const allUnits = [];
  for (let lap = 1; lap <= laps; lap++) {
    baseUnits.forEach(u => allUnits.push({ ...u, lap }));
  }

  const totalMin = allUnits.reduce((s, u) => s + u.minutes, 0);

  const days = [];
  const cur = new Date(today);
  while (cur < examDate) {
    const dow = cur.getDay();
    const isReserve = (reservePerWeek >= 1 && dow === 6) ||
                      (reservePerWeek >= 2 && dow === 5) ||
                      (reservePerWeek >= 3 && dow === 0);
    days.push({ date: new Date(cur), dateStr: cur.toISOString().slice(0,10), isReserve });
    cur.setDate(cur.getDate() + 1);
  }

  const studyDays = days.filter(d => !d.isReserve);
  const totalAvailMin = studyDays.length * dailyMin;
  const canFinish = totalAvailMin >= totalMin;
  const totalH = Math.floor(totalMin/60), totalM = totalMin%60;
  const daysToExam = Math.ceil((examDate - today) / 86400000);

  summaryEl.innerHTML = `
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num">${daysToExam}</div><div class="stat-label">試験まであと（日）</div></div>
      <div class="stat-box"><div class="stat-num">${studyDays.length}</div><div class="stat-label">学習できる日数</div></div>
      <div class="stat-box"><div class="stat-num">${totalH}h${totalM>0?totalM+'m':''}</div><div class="stat-label">総学習時間（${laps}周）</div></div>
      <div class="stat-box"><div class="stat-num">${allUnits.length}</div><div class="stat-label">総単元数（${laps}周）</div></div>
    </div>
    ${canFinish
      ? `<div class="banner banner-ok">✅ 1日 ${dailyMin}分 で、試験日までに ${laps} 周できます！</div>`
      : `<div class="banner banner-warn">⚠️ 1日 ${dailyMin}分 では間に合いません。<br>必要：${totalH}h${totalM}m ／ 確保できる：${Math.floor(totalAvailMin/60)}h${totalAvailMin%60}m<br>1日の学習時間を増やすか、周回数を減らしてください。</div>`
    }
  `;

  let unitIdx = 0;
  const todayStr = today.toISOString().slice(0,10);
  const DOW = ['日','月','火','水','木','金','土'];
  const html = [];

  days.forEach(day => {
    const isToday = day.dateStr === todayStr;
    const dow = DOW[day.date.getDay()];
    const dateLabel = `${day.date.getMonth()+1}/${day.date.getDate()}（${dow}）`;

    if (day.isReserve) {
      html.push(`<div class="schedule-day${isToday?' today':''}">
        <div class="schedule-day-header">
          <span class="day-date">${dateLabel}</span>
          <span class="day-badge badge-reserve">📌 予備日</span>
        </div>
        <span class="text-sm">遅れた分の調整・復習に使いましょう。</span>
      </div>`);
      return;
    }

    let remaining = dailyMin;
    const todayUnits = [];
    let dayTotal = 0;
    while (unitIdx < allUnits.length && remaining > 0) {
      todayUnits.push(allUnits[unitIdx]);
      dayTotal += allUnits[unitIdx].minutes;
      remaining -= allUnits[unitIdx].minutes;
      unitIdx++;
    }

    const h = Math.floor(dayTotal/60), m = dayTotal%60;
    const items = todayUnits.map(u =>
      `<div class="unit-item">
        <span class="subject-tag">${esc(u.subjName)}</span>${esc(u.matName)} › ${esc(u.unitName)}<span style="color:#aaa;font-size:0.76em"> ${u.minutes}分${laps>1?' ['+u.lap+'周目]':''}</span>
      </div>`
    ).join('');

    html.push(`<div class="schedule-day${isToday?' today':''}">
      <div class="schedule-day-header">
        <span class="day-date">${dateLabel}</span>
        ${isToday?'<span class="day-badge badge-today">今日</span>':''}
        <span class="day-time">${h>0?h+'h':''}${m>0?m+'m':'0m'} / ${dailyMin}分</span>
      </div>
      ${items || '<span class="text-sm">この日のノルマはありません。</span>'}
    </div>`);
  });

  listEl.innerHTML = html.join('');
}

// ==================== ユーティリティ ====================
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="banner banner-${type==='ok'?'ok':'warn'}">${msg}</div>`;
  setTimeout(() => { el.innerHTML=''; }, 3000);
}

// ==================== 初期化 ====================
loadSettings();
renderSubjects();
updatePresetStats();
</script>
</body>
</html>
